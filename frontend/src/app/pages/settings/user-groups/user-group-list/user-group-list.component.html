<div class="container mx-auto p-4">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">User Groups</h1>
    <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded" (click)="createGroup()">
      Create Group
    </button>
  </div>

  <div class="bg-white shadow-md rounded my-6">
    <table class="min-w-full table-auto">
      <thead>
        <tr class="bg-gray-200 text-gray-600 uppercase text-sm leading-normal">
          <th class="py-3 px-6 text-left">ID</th>
          <th class="py-3 px-6 text-left">Name</th>
          <th class="py-3 px-6 text-left">Description</th>
          <th class="py-3 px-6 text-center">Actions</th>
        </tr>
      </thead>
      <tbody class="text-gray-600 text-sm font-light">
        <tr *ngFor="let group of groups" class="border-b border-gray-200 hover:bg-gray-100">
          <td class="py-3 px-6 text-left whitespace-nowrap">{{ group.id }}</td>
          <td class="py-3 px-6 text-left">{{ group.name }}</td>
          <td class="py-3 px-6 text-left">{{ group.description }}</td>
          <td class="py-3 px-6 text-center">
            <div class="flex item-center justify-center">
              <button class="w-4 mr-2 transform hover:text-purple-500 hover:scale-110" (click)="editGroup(group)">
                Edit
              </button>
              <button class="w-4 mr-2 transform hover:text-red-500 hover:scale-110" (click)="deleteGroup(group.id)">
                Delete
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
