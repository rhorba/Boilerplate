<div class="card" style="max-width: 1000px; margin-bottom: 2rem;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <h3>My Workspaces</h3>
    <button class="btn btn-primary" (click)="createGroup()">
      Create Group
    </button>
  </div>

  <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
    <thead>
      <tr style="text-align: left; border-bottom: 1px solid #e2e8f0;">
        <th style="padding: 0.75rem;">ID</th>
        <th style="padding: 0.75rem;">Name</th>
        <th style="padding: 0.75rem;">Description</th>
        <th style="padding: 0.75rem;">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let group of groups" style="border-bottom: 1px solid #f1f5f9;">
        <td style="padding: 0.75rem;">{{ group.id }}</td>
        <td style="padding: 0.75rem;" (click)="startEdit(group.id!, 'name')">
          <span *ngIf="!isEditing(group.id, 'name')" style="font-weight: 500; cursor: pointer;">{{ group.name }}</span>
          <input *ngIf="isEditing(group.id, 'name')" [(ngModel)]="group.name" (blur)="stopEdit(group)"
            (keyup.enter)="stopEdit(group)" class="form-control" style="width: 100%;" autofocus>
        </td>
        <td style="padding: 0.75rem;" (click)="startEdit(group.id!, 'description')">
          <span *ngIf="!isEditing(group.id, 'description')" style="color: #64748b; cursor: pointer;">{{
            group.description || 'Click to add description' }}</span>
          <input *ngIf="isEditing(group.id, 'description')" [(ngModel)]="group.description" (blur)="stopEdit(group)"
            (keyup.enter)="stopEdit(group)" class="form-control" style="width: 100%;" autofocus>
        </td>
        <td style="padding: 0.75rem;">
          <button class="btn" style="color: #dc2626; background: none; border: none; padding: 0;"
            (click)="deleteGroup(group.id)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
