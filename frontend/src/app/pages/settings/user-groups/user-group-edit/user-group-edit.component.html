<div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-6">{{ isEditMode ? 'Edit' : 'Create' }} User Group</h1>

    <div class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
        <form (ngSubmit)="saveGroup()">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="name">
                    Name
                </label>
                <input
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    id="name" type="text" [(ngModel)]="group.name" name="name" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="description">
                    Description
                </label>
                <textarea
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline"
                    id="description" [(ngModel)]="group.description" name="description"></textarea>
            </div>

            <div class="mb-6" *ngIf="false"> <!-- Placeholder for User Assignment if needed here, or separate tab -->
                <h3 class="text-lg font-bold">Members</h3>
                <!-- User assignment UI could go here -->
            </div>

            <div class="flex items-center justify-between">
                <button
                    class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                    type="submit">
                    Save
                </button>
                <button
                    class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                    type="button" (click)="cancel()">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>
