<div class="card" style="max-width: 800px; margin: 2rem auto;">
    <h3 style="margin-bottom: 2rem;">{{ isEditMode ? 'Edit' : 'Create' }} Workspace</h3>

    <form (ngSubmit)="saveGroup()">
        <div class="form-group" style="margin-bottom: 1rem;">
            <label class="form-label">Name</label>
            <input class="form-control" id="name" type="text" [(ngModel)]="group.name" name="name" required
                placeholder="Workspace Name">
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="description" [(ngModel)]="group.description" name="description" rows="4"
                placeholder="Brief description of this workspace..."></textarea>
        </div>

        <div style="display: flex; gap: 1rem;">
            <button class="btn btn-primary" type="submit">
                Save
            </button>
            <button class="btn" style="background: #e2e8f0; color: #1e293b;" type="button" (click)="cancel()">
                Cancel
            </button>
        </div>
    </form>
</div>
