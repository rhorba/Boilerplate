<div class="auth-container">
  <div class="card">
    <h2 class="text-center">Welcome Back</h2>
    
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="text" class="form-control" placeholder="john@example.com" (input)="email = $any($event.target).value">
    </div>
    
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" placeholder="******" (input)="password = $any($event.target).value">
    </div>
    
    <button class="btn btn-primary" (click)="login()">Sign In</button>
    
    <div class="text-center mt-4">
      <span style="color: var(--text-muted); font-size: 0.875rem;">Don't have an account? </span>
      <a routerLink="/register" class="link">Create account</a>
    </div>

    <!-- Error/Success Message for demo -->
    <div *ngIf="message" class="text-center mt-4" style="color: red; font-size: 0.875rem;">
      {{ message }}
    </div>
  </div>
</div>
