services:
  postgres:
    image: postgres:15-alpine
    container_name: boilerplate_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: boilerplate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: boilerplate_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailhog:
    image: mailhog/mailhog
    container_name: boilerplate_mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI
    restart: always

volumes:
  postgres_data:
  redis_data:
